name: quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Validate repository
        run: python3 scripts/validate_repo.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python3 -m compileall -q imperialsetup developmentops scripts tests
