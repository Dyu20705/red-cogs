limit_req_zone $binary_remote_addr zone=developmentops:10m rate=10r/m;

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # Configure ssl_certificate and ssl_certificate_key with your TLS provider.

    client_max_body_size 2m;

    location /github {
        limit_req zone=developmentops burst=20 nodelay;
        proxy_pass http://127.0.0.1:8765/github;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# Keep the raw receiver on loopback. Do not expose port 8765 directly.
